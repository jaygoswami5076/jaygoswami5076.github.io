<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jay Goswami | Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        
        .contact-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 32px;
            padding: 3rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .contact-card:hover {
            border-color: #6366f1;
            box-shadow: 0 20px 40px -12px rgba(99, 102, 241, 0.1);
        }

        .icon-box {
            width: 48px;
            height: 48px;
            background: #f1f5f9;
            color: #64748b;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .contact-item:hover .icon-box {
            background: #6366f1;
            color: white;
            transform: scale(1.1);
        }

        /* HIGHLIGHTED PLATFORM TAGS */
        .platform-tag-highlight {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #ffffff;
            background: #4f46e5; /* Deep Indigo Highlight */
            padding: 6px 14px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2);
            display: inline-block;
        }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen">

    <main class="flex-grow flex items-center justify-center px-6 py-24">
        <div class="max-w-4xl w-full">
            
            <div class="contact-card">
                <div class="text-center mb-12">
                    <h1 class="text-4xl font-black tracking-tighter mb-2 text-slate-900">Jay <span class="text-indigo-600">Goswami</span></h1>
                    <p class="text-lg font-bold text-slate-500 mb-8">Learning and HRIS Consultant</p>
                    
                    <div class="flex flex-wrap justify-center gap-3">
                        <span class="platform-tag-highlight">Cornerstone</span>
                        <span class="platform-tag-highlight">Workday Learning</span>
                        <span class="platform-tag-highlight">SABA</span>
                        <span class="platform-tag-highlight">SAP SuccessFactors</span>
                    </div>
                </div>

                <hr class="border-slate-100 mb-12">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    
                    <a href="tel:+919458583321" class="contact-item flex items-center gap-5 group">
                        <div class="icon-box"><i data-lucide="phone" class="w-5 h-5"></i></div>
                        <div>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Call Me</p>
                            <p class="text-slate-900 font-bold group-hover:text-indigo-600 transition">(+91) 9458583321</p>
                        </div>
                    </a>

                    <a href="mailto:jay.goswami.5076@gmail.com" class="contact-item flex items-center gap-5 group">
                        <div class="icon-box"><i data-lucide="mail" class="w-5 h-5"></i></div>
                        <div>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Email Me</p>
                            <p class="text-slate-900 font-bold group-hover:text-indigo-600 transition">jay.goswami.5076@gmail.com</p>
                        </div>
                    </a>

                    <a href="https://linkedin.com/in/jay-goswami-5076" target="_blank" class="contact-item flex items-center gap-5 group">
                        <div class="icon-box"><i data-lucide="linkedin" class="w-5 h-5"></i></div>
                        <div>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">LinkedIn</p>
                            <p class="text-slate-900 font-bold group-hover:text-indigo-600 transition">/in/jay-goswami-5076</p>
                        </div>
                    </a>

                    <div class="contact-item flex items-center gap-5 group">
                        <div class="icon-box"><i data-lucide="map-pin" class="w-5 h-5"></i></div>
                        <div>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Location</p>
                            <p class="text-slate-900 font-bold transition">New Delhi, India, 110007</p>
                        </div>
                    </div>

                </div>

                <div class="mt-16 text-center">
                    <button onclick="window.print()" class="text-xs font-black text-indigo-600 uppercase tracking-widest hover:text-slate-900 transition flex items-center gap-2 mx-auto">
                        <i data-lucide="download" class="w-3 h-3"></i> Save Contact Details
                    </button>
                </div>
            </div>

<div class="mt-12 text-center">
    <button 
        onclick="location.href='index.html'" 
        class="text-slate-400 font-bold hover:text-indigo-600 transition uppercase text-[10px] tracking-[0.2em]">
        Back to Portfolio
    </button>
</div>
        </div>
    </main>

    <footer class="pb-12 text-center">
        <p class="text-slate-300 text-[10px] font-bold uppercase tracking-widest"></p>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
